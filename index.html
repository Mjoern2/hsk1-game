<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HSK1 Sentence Card Game</title>
  <style>
    :root{
      --bg:#f5f5f7; --panel:#ffffffd8; --card:#fff; --ink:#1d1d1f; --muted:#6e6e73;
      --line:#d9d9df; --soft:#ececf0; --accent:#0071e3; --green:#16833a; --red:#cc2f28;
      --shadow:0 18px 50px rgba(0,0,0,.06); --radius:28px;
    }
    *{box-sizing:border-box}
    body{margin:0; min-height:100vh; padding:30px 18px 46px; background:linear-gradient(180deg,#fbfbfd,var(--bg)); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif}
    .app{max-width:1120px; margin:0 auto}
    .vocab-btn{position:fixed; top:18px; right:18px; width:46px; height:46px; border-radius:50%; border:1px solid var(--line); background:rgba(255,255,255,.86); backdrop-filter:blur(18px); display:grid; place-items:center; cursor:pointer; box-shadow:0 10px 30px rgba(0,0,0,.06); color:var(--ink); z-index:20}
    .vocab-btn:hover{background:#fff; transform:translateY(-1px)}
    .vocab-btn svg{width:21px; height:21px; fill:none; stroke:currentColor; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round}
    header{text-align:center; margin:8px 0 22px}
    h1{margin:0; font-size:clamp(2rem,5vw,4.1rem); letter-spacing:-.06em; line-height:.96; font-weight:760}
    .subtitle{margin:12px auto 0; max-width:760px; color:var(--muted); font-size:1rem; line-height:1.45}
    .panel{background:var(--panel); border:1px solid #ffffffb8; border-radius:var(--radius); box-shadow:var(--shadow); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px)}
    .top-action{display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap}
    .toolbar{padding:14px; display:flex; gap:14px; flex-wrap:wrap; justify-content:center; align-items:center; margin-bottom:18px}
    .mode-group{display:flex; gap:8px; padding:7px; background:#ededf1; border-radius:999px; border:1px solid var(--soft); flex-wrap:wrap; justify-content:center}
    .quiz-mode-group{display:flex; gap:8px; padding:7px; background:#ededf1; border-radius:999px; border:1px solid var(--soft); flex-wrap:wrap; justify-content:center}
    .voice-controls{display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap; color:var(--muted); font-weight:650}
    .voice-controls select{font:inherit; border:1px solid var(--line); border-radius:999px; padding:11px 16px; background:#fff; color:var(--ink); max-width:330px; min-height:44px}
    .voice-controls input[type=range]{accent-color:var(--accent); width:170px}
    button{font:inherit; border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:999px; padding:10px 15px; cursor:pointer; transition:.15s ease; min-height:42px}
    button:hover{transform:translateY(-1px); box-shadow:0 8px 22px rgba(0,0,0,.07)}
    button.primary{background:var(--accent); color:#fff; border-color:var(--accent); font-weight:650}
    button.active{background:#1d1d1f; color:#fff; border-color:#1d1d1f}
    button.small{padding:6px 10px; min-height:31px; font-size:.86rem}
    button.plain{background:transparent; box-shadow:none}
    .icon-btn{width:44px; height:44px; padding:0; display:inline-flex; align-items:center; justify-content:center; border-color:var(--soft); color:#7d7d84; background:#fff; position:relative}
    .icon-btn svg{width:21px; height:21px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round}
    .icon-btn:hover{color:#1d1d1f}
    .icon-btn.active{background:#1d1d1f; color:#fff; border-color:#1d1d1f}
    .icon-btn.speaking{color:#16833a; border-color:rgba(22,131,58,.35); background:#f1fbf4}
    .icon-btn.slow::after{content:'½'; position:absolute; right:5px; bottom:3px; font-size:.72rem; font-weight:750; line-height:1}
    .icon-glyph{font-size:1.03rem; font-weight:750; letter-spacing:-.03em}
    .sentence-panel{padding:20px; margin-bottom:18px; text-align:center}
    .top-line{display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; color:var(--muted); font-size:.9rem; margin-bottom:14px}
    .cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(135px,1fr)); gap:12px; margin-bottom:16px}
    .card{background:#fff; border:1px solid var(--soft); border-radius:24px; padding:18px 12px; min-height:128px; display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 12px 30px rgba(0,0,0,.035)}
    .slot{color:var(--muted); font-size:.76rem; margin-bottom:8px; text-transform:uppercase; letter-spacing:.07em}
    .shown{font-size:2.1rem; line-height:1.05; font-weight:720; letter-spacing:-.025em; word-break:keep-all}
    .shown.character{font-size:2.75rem; letter-spacing:.02em; font-family:"PingFang SC","Noto Sans SC",system-ui,sans-serif}
    .shown.combo{display:flex; flex-direction:column; gap:7px; align-items:center}
    .shown.combo .char{font-size:2.55rem; letter-spacing:.02em; font-family:"PingFang SC","Noto Sans SC",system-ui,sans-serif}
    .shown.combo .pin{font-size:1.18rem; color:var(--muted); font-weight:650}
    .hidden-word{font-size:1.25rem; color:var(--muted); font-weight:650}
    .quiz{padding:20px; margin-bottom:18px}
    .quiz h2{margin:0 0 6px; font-size:1.42rem; letter-spacing:-.035em}
    .quiz p{margin:0 0 18px; color:var(--muted); line-height:1.4}
    .options-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px}
    .option-column{border:1px solid var(--soft); border-radius:22px; padding:12px; background:#fafafa}
    .option-title{font-size:.82rem; color:var(--muted); margin:2px 4px 10px; font-weight:650}
    .option{width:100%; border-radius:16px; padding:12px; min-height:47px; background:#fff; text-align:left; display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; box-shadow:none}
    .option.selected{border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,113,227,.12)}
    .option.correct{border-color:rgba(22,131,58,.55); background:#f1fbf4}
    .option.wrong{border-color:rgba(204,47,40,.55); background:#fff3f2}
    .option .label{font-weight:620}
    .option.disclosed{cursor:default}
    .answer-main{display:flex; flex-direction:column; gap:4px; min-width:0}
    .answer-extra{font-size:.92rem; color:var(--muted); font-weight:600; line-height:1.25}
    .answer-icons{display:flex; gap:5px; align-items:center; flex-shrink:0}
    .answer-icon{width:30px; height:30px; min-height:30px; padding:0; border-radius:999px; color:#8a8a91; background:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:740; box-shadow:none}
    .answer-icon svg{width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:1.85; stroke-linecap:round; stroke-linejoin:round}
    .answer-icon.on{background:#1d1d1f; color:#fff; border-color:#1d1d1f}
    .type-input{width:100%; border:1px solid var(--line); border-radius:16px; padding:13px 12px; min-height:47px; background:#fff; color:var(--ink); font:inherit; font-weight:620; outline:none}
    .type-input:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,113,227,.12)}
    .type-input.correct{border-color:rgba(22,131,58,.55); background:#f1fbf4}
    .type-input.wrong{border-color:rgba(204,47,40,.55); background:#fff3f2}
    .typed-answer{font-size:.86rem; color:var(--muted); line-height:1.35; margin-top:10px; padding:0 4px}
    .check-row{display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-top:18px}
    .result{margin-top:18px; text-align:center; font-size:1.05rem; font-weight:720}
    .reveal{display:none; padding:20px; margin-bottom:18px}
    .reveal.show{display:block}
    .reveal h2{margin:0 0 14px; font-size:1.38rem; letter-spacing:-.03em}
    .full-sentence{font-size:1.7rem; line-height:1.45; margin:4px 0; font-family:"PingFang SC","Noto Sans SC",system-ui,sans-serif}
    .pinyin-line{font-size:1.14rem; color:var(--muted); margin:4px 0 12px}
    .translation{font-size:1.1rem; margin:0 0 18px}
    .breakdown{display:grid; grid-template-columns:repeat(auto-fit,minmax(145px,1fr)); gap:10px}
    .mini{background:#fff; border:1px solid var(--soft); border-radius:18px; padding:12px}
    .mini .hanzi{font-size:1.55rem; font-family:"PingFang SC","Noto Sans SC",system-ui,sans-serif}
    .mini .pin{color:var(--muted); margin-top:2px}
    .mini .eng{font-weight:650; margin-top:8px}
    .stroke-strip{display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; min-height:48px}
    .stroke-box{width:48px; height:48px; border:1px solid var(--soft); border-radius:12px; background:#fbfbfd; overflow:hidden}
    .stroke-fallback{font-size:.78rem; color:var(--muted); margin-top:8px; line-height:1.3}
    .stats{padding:18px; margin-top:18px}
    .stats-head{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:12px}
    .stats-head h2{margin:0; font-size:1.35rem; letter-spacing:-.03em}
    .tabs{display:flex; gap:6px; padding:4px; background:#ededf1; border-radius:999px; flex-wrap:wrap}
    .stat-panel{display:none}
    .stat-panel.show{display:block}
    .stat-list{display:grid; gap:8px}
    .stat-row{display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; background:#fff; border:1px solid var(--soft); border-radius:16px; padding:12px}
    .stat-word{font-weight:720}.stat-word span{display:block; color:var(--muted); font-weight:500; font-size:.92rem; margin-top:2px}
    .stat-score{font-size:.9rem; border-radius:999px; padding:5px 10px; background:#f7f7fa; white-space:nowrap; font-weight:560}.stat-right{color:var(--ink); font-weight:560}.stat-wrong-count{color:var(--red); font-weight:560}
    .pill{font-size:.85rem; border-radius:999px; padding:5px 9px; background:#f2f2f5; color:var(--muted); white-space:nowrap}
    .pill.good{background:#eef9f1; color:var(--green)}.pill.bad{background:#fff0ef; color:var(--red)}
    .empty{color:var(--muted); background:#fff; border:1px solid var(--soft); border-radius:16px; padding:16px; text-align:center}
    .stats-actions,.history-actions{display:flex; justify-content:flex-end; margin-top:12px}
    .danger-soft{color:#9a4d48; background:#fff7f6; border-color:#f2d7d4}
    .icon-toggle.active{background:#1d1d1f; color:#fff; border-color:#1d1d1f}.icon-toggle .sort-wrong{color:var(--red)}.icon-toggle.active .sort-wrong{color:#ffb5ae}.icon-toggle .sort-correct{color:inherit}
    .history{padding:18px; margin-top:18px}
    .history-list{display:grid; gap:10px}
    .history-row{display:grid; grid-template-columns:auto 1fr; gap:12px; align-items:start; background:#fff; border:1px solid var(--soft); border-radius:18px; padding:12px}
    .history-sound{width:34px; height:34px; min-height:34px; padding:0; display:inline-grid; place-items:center; color:#7d7d84; border-color:var(--soft); background:#fbfbfd}
    .history-sound svg{width:17px; height:17px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round}
    .history-line{line-height:1.55; word-break:break-word}
    .history-pinyin{color:var(--muted); font-size:.96rem}
    .history-zh{font-family:"PingFang SC","Noto Sans SC",system-ui,sans-serif; font-size:1.25rem}
    .history-en{color:var(--muted); font-size:.95rem; margin-top:2px}
    .history-wrong{color:var(--red); font-weight:750}
    .history-score{font-size:.83rem; border-radius:999px; padding:5px 9px; background:#f2f2f5; color:var(--muted); white-space:nowrap}
    .collapse-title{width:100%; display:flex; align-items:center; justify-content:space-between; gap:12px; background:transparent; border:0; border-radius:20px; padding:0; min-height:auto; box-shadow:none; text-align:left}
    .collapse-title:hover{transform:none; box-shadow:none}
    .collapse-title h2{margin:0; font-size:1.35rem; letter-spacing:-.03em}
    .chevron{width:28px; height:28px; border-radius:999px; display:grid; place-items:center; color:var(--muted); background:#f2f2f5; transition:.18s ease}
    .chevron svg{width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round}
    .collapsible.collapsed .chevron{transform:rotate(-90deg)}
    .collapsible.collapsed .collapsible-body{display:none}
    .collapsible .collapsible-body{margin-top:14px}

    .daily-goal{display:inline-flex; align-items:center; justify-content:center; gap:6px; color:#9a9aa0; background:rgba(255,255,255,.58); border:1px solid var(--soft); border-radius:999px; padding:6px 10px; font-size:.82rem; font-weight:650; margin-top:10px}
    .daily-goal.hidden{display:none}
    .daily-goal-bottom{display:flex; justify-content:flex-end; max-width:1120px; margin:12px auto 0}
    .settings{padding:18px; margin-top:18px}
    .settings-grid{display:grid; gap:12px}
    .setting-row{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; background:#fff; border:1px solid var(--soft); border-radius:18px; padding:13px 14px}
    .setting-label{font-weight:720}.setting-label span{display:block; color:var(--muted); font-weight:500; font-size:.9rem; margin-top:2px}
    .segmented{display:flex; gap:6px; padding:5px; background:#ededf1; border-radius:999px; flex-wrap:wrap}
    .segmented button{min-height:32px; padding:6px 10px; font-size:.84rem; color:#77777d; box-shadow:none}
    .segmented button.active{background:#fff; color:#1d1d1f; border-color:#fff}
    @media(max-width:640px){body{padding:18px 12px 34px}.toolbar,.sentence-panel,.quiz,.reveal,.stats,.history{padding:14px}.cards{grid-template-columns:repeat(2,1fr)}.shown{font-size:1.65rem}.shown.character{font-size:2.2rem}.options-grid{grid-template-columns:1fr}.stat-row{grid-template-columns:1fr; gap:6px}.history-row{grid-template-columns:auto 1fr;}.history-score{grid-column:2}}
  </style>
</head>
<body>
  <button class="vocab-btn" id="vocabBtn" aria-label="Open vocabulary" title="Vocabulary">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5.8c0-1 0-1.5.3-1.9.3-.4.8-.6 1.7-.6h4.2c1.1 0 2 .9 2 2v14.2c0-1.1-.9-2-2-2H7c-.9 0-1.4.2-1.7.6-.3.4-.3.9-.3 1.9V5.8z"></path><path d="M13.2 5.3c0-1.1.9-2 2-2H19c.9 0 1.4.2 1.7.6.3.4.3.9.3 1.9V20c0-1-.1-1.5-.3-1.9-.3-.4-.8-.6-1.7-.6h-3.8c-1.1 0-2 .9-2 2V5.3z"></path></svg>
  </button>

  <main class="app">
    <header>
      <h1>HSK1 sentence cards</h1>
      <div class="daily-goal hidden" id="dailyGoalTop"></div>
    </header>

    <div class="top-action">
      <div class="quiz-mode-group" aria-label="Answer mode">
        <button class="primary" id="choiceMode">Choose</button>
        <button id="typeMode">Write</button>
      </div>
    </div>

    <section class="toolbar panel">
      <div class="mode-group" aria-label="Game mode">
        <button id="modeAudio" class="active">Audio</button>
        <button id="modePinyin">Pinyin</button>
        <button id="modeChars">Characters</button>
        <button id="modeBoth">Pinyin + Characters</button>
      </div>
      <button id="readBtn" class="icon-btn" aria-label="Read sentence" title="Read sentence">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9H4z"></path><path d="M16 9.5c1 .9 1 4.1 0 5"></path><path d="M19 7c2.2 2.3 2.2 7.7 0 10"></path></svg>
      </button>
    </section>

    <section class="sentence-panel panel">
      <div class="cards" id="cards"></div>
    </section>

    <section class="quiz panel">
      <div class="options-grid" id="optionsGrid"></div>
      <div class="check-row">
        <button class="primary" id="checkBtn">Disclose answers</button>
      </div>
      <div class="result" id="result"></div>
    </section>

    <section class="reveal panel" id="revealBox">
      <h2>Answer</h2>
      <div class="full-sentence" id="fullSentence"></div>
      <div class="pinyin-line" id="fullPinyin"></div>
      <p class="translation" id="fullTranslation"></p>
      <div class="breakdown" id="breakdown"></div>
    </section>

    <section class="stats panel collapsible collapsed" id="statsSection">
      <button class="collapse-title" id="statsToggle" aria-expanded="false">
        <h2 id="statsTitle">Statistics</h2>
        <span class="chevron" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></span>
      </button>
      <div class="collapsible-body">
        <div class="stats-head">
          <button class="small" id="reviewMistakesBtn">Review mistakes</button>
          <button class="small icon-toggle" id="statsSortBtn" title="Toggle correct/wrong order"><span class="sort-correct">correct</span>/<span class="sort-wrong">wrong</span></button>
        </div>
        <div class="stat-panel show" id="statsPanel"></div>
        <div class="stats-actions">
          <button class="small danger-soft" id="resetStatsBtn">Reset stats</button>
        </div>
      </div>
    </section>

    <section class="history panel collapsible collapsed" id="historySection">
      <button class="collapse-title" id="historyToggle" aria-expanded="false">
        <h2>History</h2>
        <span class="chevron" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></span>
      </button>
      <div class="collapsible-body">
        <div class="history-list" id="historyList"></div>
        <div class="history-actions">
          <button class="small danger-soft" id="clearHistoryBtn">Clear history</button>
        </div>
      </div>
    </section>

    <section class="settings panel collapsible collapsed" id="settingsSection">
      <button class="collapse-title" id="settingsToggle" aria-expanded="false">
        <h2>Settings</h2>
        <span class="chevron" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></span>
      </button>
      <div class="collapsible-body">
        <div class="settings-grid">
          <div class="setting-row">
            <div class="setting-label">Game set <span>Choose how many words the game uses.</span></div>
            <div class="segmented" aria-label="Game word count">
              <button id="homeSet100Btn" title="Game uses 100 words">100</button>
              <button id="homeSet200Btn" title="Game uses 200 words">200</button>
              <button id="homeSet300Btn" title="Game uses all 300 words">300</button>
              <button id="homeDefaultSetBtn" title="Open the game with this set next time">☆ default</button>
            </div>
          </div>
          <div class="setting-row">
            <div class="setting-label">Today goal <span>Show a small daily 10-sentence counter.</span></div>
            <div class="segmented" aria-label="Today goal placement">
              <button id="goalHiddenBtn">Hidden</button>
              <button id="goalTopBtn">Under title</button>
              <button id="goalBottomBtn">Bottom</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="daily-goal-bottom"><div class="daily-goal hidden" id="dailyGoalBottom"></div></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
  <script>
    const sentences = [
      {zh:"我爱你。", py:"Wǒ ài nǐ.", en:"I love you.", words:[w("我","wǒ","I / me","person"),w("爱","ài","love","verb"),w("你","nǐ","you","person")]},
      {zh:"你好吗？", py:"Nǐ hǎo ma?", en:"How are you?", words:[w("你","nǐ","you","person"),w("好","hǎo","good / well","adj"),w("吗","ma","question particle","particle")]},
      {zh:"她是老师。", py:"Tā shì lǎoshī.", en:"She is a teacher.", words:[w("她","tā","she / her","person"),w("是","shì","is / am / are","verb"),w("老师","lǎoshī","teacher","person")]},
      {zh:"他不是学生。", py:"Tā bú shì xuésheng.", en:"He is not a student.", words:[w("他","tā","he / him","person"),w("不","bù","not","particle"),w("是","shì","is / am / are","verb"),w("学生","xuésheng","student","person")]},
      {zh:"我想喝水。", py:"Wǒ xiǎng hē shuǐ.", en:"I want to drink water.", words:[w("我","wǒ","I / me","person"),w("想","xiǎng","would like / want","modal"),w("喝","hē","drink","verb"),w("水","shuǐ","water","object")]},
      {zh:"你想喝茶吗？", py:"Nǐ xiǎng hē chá ma?", en:"Do you want to drink tea?", words:[w("你","nǐ","you","person"),w("想","xiǎng","would like / want","modal"),w("喝","hē","drink","verb"),w("茶","chá","tea","object"),w("吗","ma","question particle","particle")]},
      {zh:"我不喝咖啡。", py:"Wǒ bù hē kāfēi.", en:"I do not drink coffee.", words:[w("我","wǒ","I / me","person"),w("不","bù","not","particle"),w("喝","hē","drink","verb"),w("咖啡","kāfēi","coffee","object")]},
      {zh:"他会说中文。", py:"Tā huì shuō Zhōngwén.", en:"He can speak Chinese.", words:[w("他","tā","he / him","person"),w("会","huì","can / know how to","modal"),w("说","shuō","speak / say","verb"),w("中文","Zhōngwén","Chinese language","object")]},

    function genericDistractors(word){
      const pools = {
        person:["friend","brother","schoolmate","teacher","student","person"],
        time:["now","later","today","tomorrow","yesterday","morning"],
        verb:["read","write","speak","watch","buy","go","come","like","have"],
        object:["tea","water","coffee","milk","book","movie","name","money"],
        place:["school","home","shop","hospital","restaurant","China"],
        adj:["good","small","big","pretty","happy","hot","cold"],
        question:["what","who","where","which","how many"],
        modal:["want","can","need","may","know how to"],
        particle:["not","also","question particle","possessive particle","all"],
        adverb:["very","too","also","all","many"],
        number:["one","two","three","four","five"],
        measure:["general classifier","animal classifier","book classifier","cup classifier"],
        pronoun:["this","that","which one","here","there"]
      };
      return pools[word.type] || vocab.filter(v=>v.type===word.type).map(v=>v.en);
    }
    function normLabel(text){
      return normalizeAnswer(String(text || "").replace(/\s*\/\s*/g," "));
    }
    function wordsForEnglish(label, type){
      const target = normLabel(label);
      return activeVocab().filter(v => (!type || v.type === type) && (
        normLabel(v.en) === target ||
        normLabel(v.en).split(" ").includes(target) ||
        target.split(" ").some(part => part.length > 2 && normLabel(v.en).split(" ").includes(part))
      ));
    }
    function optionVariantsFor(word){
      const variants = new Set(answerVariants(word.en));
      acceptedAnswers(word).forEach(v => variants.add(normalizeAnswer(v)));
      return [...variants].filter(Boolean);
    }
    function optionConflictsWithUsed(word, usedLabels){
      return optionVariantsFor(word).some(v => usedLabels.has(v));
    }
    function addOptionIfClean(opts, usedKeys, usedLabels, candidate, correct=false){
      if(!candidate || usedKeys.has(candidate.key)) return false;
      if(optionConflictsWithUsed(candidate, usedLabels)) return false;
      usedKeys.add(candidate.key);
      optionVariantsFor(candidate).forEach(v => usedLabels.add(v));
      opts.push({en:candidate.en, zh:candidate.zh, py:candidate.py, key:candidate.key, correct});
      return true;
    }
    function buildOptions(word){
      const desired = 3;
      const used = new Set();
      const usedLabels = new Set();
      const opts = [];
      addOptionIfClean(opts, used, usedLabels, word, true);
      const candidates = [];
      (closeDistractors[word.zh] || []).forEach(label => {
        wordsForEnglish(label, word.type).forEach(v => candidates.push(v));
      });
      activeVocab().filter(v => v.type === word.type && v.key !== word.key).forEach(v => candidates.push(v));
      activeVocab().filter(v => v.key !== word.key).forEach(v => candidates.push(v));
      for(const c of candidates){
        if(opts.length >= desired) break;
        addOptionIfClean(opts, used, usedLabels, c, false);
      }
      let guard = 0;
      while(opts.length < desired && guard < 800){
        guard++;
        addOptionIfClean(opts, used, usedLabels, rand(activeVocab()), false);
      }
      return shuffle(opts);
    }

    function normalizeAnswer(text){
      return String(text || "")
        .toLowerCase()
        .trim()
        .replace(/[.!?,;:]/g, "")
        .replace(/\s+/g, " ");
    }
    function answerVariants(label){
      const raw = normalizeAnswer(label);
      if(!raw) return [];
      const pieces = raw
        .split(/\s*\/\s*|\s*,\s*|\s*;\s*/)
        .map(x => normalizeAnswer(x))
        .filter(Boolean);
      const out = new Set([raw, ...pieces]);
      for(const item of [...out]){
        const words = item.split(" ");
        const last = words[words.length - 1];
        if(last){
          const addLast = v => { const copy = words.slice(); copy[copy.length - 1] = v; out.add(copy.join(" ")); };
          if(last.endsWith("ies") && last.length > 4) addLast(last.slice(0, -3) + "y");
          if(last.endsWith("es") && last.length > 3) addLast(last.slice(0, -2));
          if(last.endsWith("s") && last.length > 3) addLast(last.slice(0, -1));
          if(last.endsWith("ing") && last.length > 5){
            addLast(last.slice(0, -3));
            const stem = last.slice(0, -3);
            if(stem.length > 2 && stem[stem.length - 1] === stem[stem.length - 2]) addLast(stem.slice(0, -1));
          }
          if(last.endsWith("ed") && last.length > 4) addLast(last.slice(0, -2));
        }
      }
      return [...out];
    }

    function acceptedAnswers(word){
      const base = [word.en];
      const extras = {
        "我":["i","me"], "你":["you"], "他":["he","him"], "她":["she","her"], "我们":["we","us"], "他们":["they","them"],
        "爱":["love"], "喜欢":["like","likes"], "想":["want","want to","would like"], "要":["want","need","will","want to"],
        "看":["watch","look","see","read"], "听":["listen","hear","listen to"], "说":["speak","say","talk"], "读":["read"], "写":["write"],
        "吃":["eat"], "喝":["drink"], "去":["go","go to"], "来":["come"], "买":["buy"], "有":["have","has","there is","there are"],
        "在":["at","in","be at","is at"], "是":["is","am","are","be"], "不":["not","no"], "很":["very"], "也":["also","too"], "都":["all"],
        "吗":["question particle","question","yes no question"], "什么":["what"], "谁":["who"], "哪儿":["where"],
        "今天":["today"], "明天":["tomorrow"], "现在":["now"], "上午":["morning","in the morning"], "下午":["afternoon","in the afternoon"],
        "家":["home","family"], "学校":["school"], "医院":["hospital"], "中国":["china"], "北京":["beijing"],
        "老师":["teacher"], "学生":["student"], "朋友":["friend"], "同学":["classmate","schoolmate"], "哥哥":["older brother","big brother"], "弟弟":["younger brother","little brother"],
        "水":["water"], "茶":["tea"], "牛奶":["milk"], "咖啡":["coffee"], "米饭":["rice","cooked rice"], "书":["book"], "电视":["tv","television"], "电影":["movie","film"]
      };
      const list = [...base, ...(extras[word.zh] || [])];
      const expanded = [];
      list.forEach(label => expanded.push(...answerVariants(label)));
      return [...new Set(expanded.map(normalizeAnswer).filter(Boolean))];
    }
    function isTypedCorrect(word, answer){
      const clean = normalizeAnswer(answer);
      if(!clean) return false;
      const variants = answerVariants(clean);
      const accepted = acceptedAnswers(word);
      return variants.some(v => accepted.includes(v));
    }

    function startSentence(next, shouldSpeak=false){
      currentIndex = sentences.findIndex(s => s.zh === next.zh);
      current = JSON.parse(JSON.stringify(next));
      current.words.forEach(x => x.key = x.zh+"|"+x.py+"|"+x.en);
      currentOptions = current.words.map(word => buildOptions(word));
      selected = {}; typedAnswers = {}; answerRevealState = {}; disclosed = false; result.textContent=""; revealBox.classList.remove("show");

    function newSentence(shouldSpeak=false){
      const pool = activeSentences();
      let next = rand(pool);
      if(pool.length > 1 && current){
        let guard = 0;
        while(next.zh === current.zh && guard < 200){
          next = rand(pool);
          guard++;
        }
      }
      startSentence(next, shouldSpeak);
    }

    function reviewMistakes(){
      const keys = mistakeKeys();
      if(!keys.size){ result.textContent = "No mistakes to review yet."; return; }
      const pool = activeSentences().filter(s => s.words.some(w => keys.has(w.key)));

    function answerExtraText(opt, st){

    function toggleAnswerInfo(stateKey, field, opt){

    function statsKey(){ return quizMode === "type" ? "hsk1SentenceStats_type" : "hsk1SentenceStats_choice"; }
    function getStats(){try{return JSON.parse(localStorage.getItem(statsKey())||"{}");}catch{return {};}}
    function saveStats(stats){localStorage.setItem(statsKey(), JSON.stringify(stats));}
    function updateStats(){
      const stats = getStats();
      current.words.forEach((word,i)=>{
        const k = word.key;
        if(!stats[k]) stats[k] = {key:k, zh:word.zh, py:word.py, en:word.en, right:0, wrong:0};
        stats[k].key = k;
        if(quizMode === "type" ? isTypedCorrect(word, typedAnswers[i]) : selected[i] === word.key) stats[k].right++; else stats[k].wrong++;
      });
      saveStats(stats); renderStats();
    }
    function disclose(){
      if(!current){ result.textContent = ""; return; }
      if(disclosed) return;
      if(quizMode === "type"){
        const typedCount = current.words.filter((_,i)=>normalizeAnswer(typedAnswers[i]).length > 0).length;
        if(typedCount < current.words.length){ result.textContent = `Type all ${current.words.length} meanings first.`; return; }
      }else if(Object.keys(selected).length < current.words.length){
        result.textContent = `Choose all ${current.words.length} words first.`; return;
      }
      disclosed = true; let score = 0;
      const correctness = current.words.map((word,i)=> quizMode === "type" ? isTypedCorrect(word, typedAnswers[i]) : selected[i] === word.key);
      correctness.forEach(ok => { if(ok) score++; });
      result.textContent = `You got ${score}/${current.words.length} words right.`;
      renderOptions();
      document.getElementById("fullSentence").textContent = current.zh;
      document.getElementById("fullPinyin").textContent = current.py;
      document.getElementById("fullTranslation").textContent = current.en;
      const breakdown = document.getElementById("breakdown"); breakdown.innerHTML="";
      current.words.forEach((word,wi)=>{
        const div = document.createElement("div"); div.className="mini";
        div.innerHTML = `<div class="hanzi">${word.zh}</div><div class="pin">${word.py}</div><div class="eng">${word.en}</div><div class="stroke-strip" id="stroke-${wi}"></div>`;
        breakdown.appendChild(div);
        renderStrokeOrder(word.zh, `stroke-${wi}`);
      });
      revealBox.classList.add("show"); updateStats(); addHistoryEntry(score, correctness); incrementDailyGoal();
    }

    function renderStrokeOrder(text, containerId){
      const container = document.getElementById(containerId);
      if(!container) return;
      const chars = [...text].filter(ch => /[\u3400-\u9fff]/.test(ch)).slice(0,3);
      if(!chars.length) return;
      if(typeof HanziWriter === "undefined"){
        container.innerHTML = `<div class="stroke-fallback">Stroke animation needs internet access for HanziWriter.</div>`;
        return;
      }
      chars.forEach((ch,ci)=>{
        const box = document.createElement("div");
        box.className = "stroke-box";
        box.id = `${containerId}-char-${ci}`;
        container.appendChild(box);
        try{
          const writer = HanziWriter.create(box.id, ch, {
            width:48, height:48, padding:4, showOutline:true, showCharacter:false,
            strokeAnimationSpeed:0.55, delayBetweenStrokes:500, delayBetweenLoops:900, strokeColor:'#1d1d1f', outlineColor:'#d9d9df', drawingColor:'#0071e3'
          });
          setTimeout(()=>{
            if(typeof writer.loopCharacterAnimation === "function") writer.loopCharacterAnimation();
            else { const loop = () => writer.animateCharacter({onComplete:()=>setTimeout(loop,900)}); loop(); }
          }, 220 + ci*650);
        }catch(e){
          box.textContent = ch;
          box.style.display='flex'; box.style.alignItems='center'; box.style.justifyContent='center';
        }
      });
    }

      stats.sort((a,b)=>{
        if(statsSortMode === "right") return (b.right-a.right) || (a.wrong-b.wrong) || a.py.localeCompare(b.py);
        return (b.wrong-a.wrong) || (a.right-b.right) || a.py.localeCompare(b.py);
      });
      const panel = document.getElementById("statsPanel");
      if(panel) panel.innerHTML = makeStatList(stats);
      const btn = document.getElementById("statsSortBtn");
      if(btn){
        btn.classList.toggle("active", statsSortMode !== "right");

      </style></head><body><main><header><h1>Vocabulary</h1></header>
      <nav class="topnav"><a href="#words">Words</a><a href="#settings">Settings</a></nav>
      <section id="settings" class="simple-panel section"><div class="control-row"><div class="control-title">Game set <span>Choose how many words the game uses.</span></div><span class="set-options" id="setOptions"></span><button class="default-option" id="defaultBtn" title="Open the game with this set next time">☆ default</button></div><div class="control-row"><div class="control-title">Today goal <span>Show a minimal 10-sentence daily counter.</span></div><span class="set-options" id="goalOptions"></span></div></section>

      </main><div class="detail-backdrop" id="detailBackdrop"><div class="detail-card"><button type="button" class="close" id="closeDetailBtn">×</button><div id="detailContent"></div></div></div><script>
        const WORDS = ${wordsJson};
        const WORD_MAP = new Map(WORDS.map(function(w){ return [w.key, w]; }));
        let currentLimit = ${activeWordLimit};
        let defaultLimit = ${defaultWordLimit};
        let dailyGoalPlacement = ${JSON.stringify(dailyGoalPlacement)};
        let sortField = localStorage.getItem("hsk1VocabSortField") || "py";
        let sortDirs = {
          py: localStorage.getItem("hsk1VocabSortDir_py") || localStorage.getItem("hsk1VocabSortDir") || "asc",
          type: localStorage.getItem("hsk1VocabSortDir_type") || "asc"
        };
        if(["py","type"].indexOf(sortField) < 0) sortField = "py";
        if(["asc","desc"].indexOf(sortDirs.py) < 0) sortDirs.py = "asc";
        if(["asc","desc"].indexOf(sortDirs.type) < 0) sortDirs.type = "asc";
        let favoriteMode = "off";
        localStorage.setItem("hsk1VocabFavoriteMode", "off");
        function parentWindow(){ return window.opener && !window.opener.closed ? window.opener : null; }
        function esc(value){ return String(value == null ? "" : value).replace(/[&<>\"]/g, function(ch){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\\\"":"&quot;"}[ch] || ch; }); }
        function attr(value){ return esc(value).replace(/'/g,"&#39;"); }
        function favArray(){ try{return JSON.parse(localStorage.getItem("hsk1FavoriteWords") || "[]").filter(Boolean);}catch(e){return [];} }
        function saveFavArray(items){ localStorage.setItem("hsk1FavoriteWords", JSON.stringify(Array.from(new Set(items)))); }
        function favSet(){ return new Set(favArray()); }
        function favIndex(){ const m = new Map(); favArray().forEach(function(key,i){ m.set(key,i); }); return m; }
        function compareText(field, dir){ return function(a,b){ let av = String(a[field] || ""); let bv = String(b[field] || ""); let c = av.localeCompare(bv, undefined, {sensitivity:"base"}); if(c === 0) c = a.py.localeCompare(b.py, undefined, {sensitivity:"base"}) || a.zh.localeCompare(b.zh, undefined, {sensitivity:"base"}); return dir === "desc" ? -c : c; }; }
        function favoriteCompare(a,b){ const idx = favIndex(); if(favoriteMode === "date") return (idx.get(a.key) ?? 999999) - (idx.get(b.key) ?? 999999); if(favoriteMode === "az") return a.py.localeCompare(b.py, undefined, {sensitivity:"base"}) || a.zh.localeCompare(b.zh, undefined, {sensitivity:"base"}); if(favoriteMode === "za") return b.py.localeCompare(a.py, undefined, {sensitivity:"base"}) || b.zh.localeCompare(a.zh, undefined, {sensitivity:"base"}); return 0; }
        function sorted(items){ const fset = favSet(); const base = items.slice().sort(compareText(sortField, sortDirs[sortField] || "asc")); if(favoriteMode === "off") return base; return base.sort(function(a,b){ const af=fset.has(a.key), bf=fset.has(b.key); if(af !== bf) return af ? -1 : 1; if(af && bf) return favoriteCompare(a,b); return 0; }); }
        function rowHtml(w, i, extra){ const fset = favSet(); return '<tr class="'+extra+'" data-key="'+attr(w.key)+'"><td class="favcell"><button type="button" class="fav '+(fset.has(w.key)?'on':'')+'" data-fav-key="'+attr(w.key)+'">'+(fset.has(w.key)?'♥':'♡')+'</button></td><td class="num">'+(i+1)+'</td><td class="zh">'+esc(w.zh)+'</td><td>'+esc(w.py)+'</td><td>'+esc(w.en)+'</td><td class="type"><span class="type-badge">'+esc(w.type)+'</span></td></tr>'; }
        function renderRows(){ const active = sorted(WORDS.filter(function(w){return w.tier <= currentLimit;})); const inactive = sorted(WORDS.filter(function(w){return w.tier > currentLimit;})); const rows = active.map(function(w,i){return rowHtml(w,i,"active-row");}).concat(inactive.map(function(w,i){return rowHtml(w,active.length+i,"inactive-row"+(i===0?" first-inactive":""));})); document.getElementById("wordRows").innerHTML = rows.join(""); updateControls(); }
        function updateControls(){
          const pyMark = document.getElementById("pySortMark");
          const typeMark = document.getElementById("typeSortMark");
          if(pyMark){ pyMark.textContent = sortDirs.py === "asc" ? "↑" : "↓"; pyMark.classList.toggle("active", sortField === "py"); }
          if(typeMark){ typeMark.textContent = sortDirs.type === "asc" ? "↑" : "↓"; typeMark.classList.toggle("active", sortField === "type"); }
          document.querySelectorAll("[data-sort-field]").forEach(function(btn){ btn.classList.toggle("active", btn.dataset.sortField === sortField); });
          const fh = document.getElementById("favHeadBtn");
          if(fh){ fh.classList.toggle("on", favoriteMode !== "off"); fh.textContent = favoriteMode !== "off" ? "♥" : "♡"; }
          document.getElementById("setOptions").innerHTML = [100,200,300].map(function(n){ return '<button type="button" class="set-option '+(currentLimit===n?'active':'')+'" data-set="'+n+'" title="Game uses '+(n===300?'all ':'')+n+' words">'+n+'</button>'; }).join("");
          document.getElementById("defaultBtn").textContent = currentLimit === defaultLimit ? "★ default" : "☆ default";
          document.getElementById("goalOptions").innerHTML = [{id:"hidden",label:"Hidden"},{id:"top",label:"Under title"},{id:"bottom",label:"Bottom"}].map(function(x){ return '<button type="button" class="set-option '+(dailyGoalPlacement===x.id?'active':'')+'" data-goal="'+x.id+'">'+x.label+'</button>'; }).join("");
        }
        function setSort(field){
          if(["py","type"].indexOf(field)<0) return;
          sortField = field;
          sortDirs[field] = sortDirs[field] === "asc" ? "desc" : "asc";
          localStorage.setItem("hsk1VocabSortField", sortField);
          localStorage.setItem("hsk1VocabSortDir_" + field, sortDirs[field]);
          localStorage.setItem("hsk1VocabSortDir", sortDirs[field]);
          renderRows();
        }
        function toggleFav(key){ const arr = favArray(); const idx = arr.indexOf(key); if(idx >= 0) arr.splice(idx,1); else arr.unshift(key); saveFavArray(arr); renderRows(); }
        function toggleFavMode(){
          favoriteMode = favoriteMode === "off" ? "date" : "off";
          localStorage.setItem("hsk1VocabFavoriteMode", favoriteMode);
          localStorage.removeItem("hsk1VocabFavoritesFirst");
          renderRows();
        }
        function setGameSet(limit){ currentLimit = Number(limit); const parent = parentWindow(); if(parent && parent.setWordLimitFromVocabulary) parent.setWordLimitFromVocabulary(currentLimit); renderRows(); }
        function makeCurrentDefault(){ defaultLimit = currentLimit; const parent = parentWindow(); if(parent && parent.setDefaultWordLimitFromVocabulary) parent.setDefaultWordLimitFromVocabulary(defaultLimit); updateControls(); }
        function setGoal(place){ dailyGoalPlacement = place; const parent = parentWindow(); if(parent && parent.setDailyGoalPlacementFromVocabulary) parent.setDailyGoalPlacementFromVocabulary(place); updateControls(); }
        function playText(text){ const parent = parentWindow(); if(parent && parent.speakFromVocabulary){ parent.speakFromVocabulary(text); return; } try{ const u = new SpeechSynthesisUtterance(text); u.lang="zh-CN"; speechSynthesis.speak(u); }catch(e){} }
        function showWord(key){ const w = WORD_MAP.get(key); if(!w) return; const icon = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 10v4h4l5 4V6L8 10H4z"></path><path d="M16 9c1 .8 1.5 1.8 1.5 3S17 14.2 16 15"></path><path d="M18.5 6.5A7 7 0 0 1 21 12a7 7 0 0 1-2.5 5.5"></path></svg>'; const ex = w.example ? '<div class="detail-example"><div class="example-main-line"><div class="example-zh">'+esc(w.example.zh)+'</div><button type="button" class="sound-btn" data-play="sentence" data-key="'+attr(w.key)+'" title="Play sentence" aria-label="Play sentence">'+icon+'</button></div><div class="example-py">'+esc(w.example.py)+'</div><div class="example-en">'+esc(w.example.en)+'</div></div>' : ""; document.getElementById("detailContent").innerHTML = '<div class="detail-head"><div class="detail-word-line"><div class="detail-zh">'+esc(w.zh)+'</div><button type="button" class="sound-btn" data-play="word" data-key="'+attr(w.key)+'" title="Play word" aria-label="Play word">'+icon+'</button><div class="popup-stroke-strip" id="popupStroke"></div></div><div class="detail-py">'+esc(w.py)+'</div><div class="detail-en">'+esc(w.en)+'</div></div>'+ex; document.getElementById("detailBackdrop").classList.add("show"); renderPopupStrokeOrder(w.zh); }
        function closeDetail(){ document.getElementById("detailBackdrop").classList.remove("show"); }
        function renderPopupStrokeOrder(text){
          const container = document.getElementById("popupStroke");
          if(!container) return;
          container.innerHTML = "";
          const chars = [...text].filter(function(ch){ return /[\u3400-\u9fff]/.test(ch); }).slice(0,3);
          if(!chars.length) return;
          const parent = parentWindow();
          const HW = window.HanziWriter || (parent && parent.HanziWriter);
          if(!HW){ return; }
          chars.forEach(function(ch,ci){
            const box = document.createElement("div");
            box.className = "popup-stroke-box";
            container.appendChild(box);
            try{
              const writer = HW.create(box, ch, {
                width:48, height:48, padding:4, showOutline:true, showCharacter:false,
                strokeAnimationSpeed:0.55, delayBetweenStrokes:500, delayBetweenLoops:900,
                strokeColor:"#1d1d1f", outlineColor:"#d9d9df", drawingColor:"#0071e3"
              });
              setTimeout(function(){
                if(typeof writer.loopCharacterAnimation === "function") writer.loopCharacterAnimation();
                else {
                  const loop = function(){ writer.animateCharacter({onComplete:function(){setTimeout(loop,900);}}); };
                  loop();
                }
              }, 220 + ci*650);
            }catch(e){
              box.textContent = ch;
              box.style.display = "flex";
              box.style.alignItems = "center";
              box.style.justifyContent = "center";
            }
          });
        }
        document.addEventListener("click", function(event){ const playButton = event.target.closest("[data-play]"); if(playButton){ event.preventDefault(); event.stopPropagation(); const w = WORD_MAP.get(playButton.dataset.key); if(!w) return; if(playButton.dataset.play === "word") playText(w.zh); if(playButton.dataset.play === "sentence" && w.example) playText(w.example.zh); return; } const sortButton = event.target.closest("[data-sort-field]"); if(sortButton){ event.preventDefault(); setSort(sortButton.dataset.sortField); return; } const favButton = event.target.closest("[data-fav-key]"); if(favButton){ event.preventDefault(); event.stopPropagation(); toggleFav(favButton.dataset.favKey); return; } if(event.target.closest("#favHeadBtn")){ event.preventDefault(); toggleFavMode(); return; } const setButton = event.target.closest("[data-set]"); if(setButton){ event.preventDefault(); setGameSet(setButton.dataset.set); return; } if(event.target.closest("#defaultBtn")){ event.preventDefault(); makeCurrentDefault(); return; } const goalButton = event.target.closest("[data-goal]"); if(goalButton){ event.preventDefault(); setGoal(goalButton.dataset.goal); return; } if(event.target.closest("#closeDetailBtn")){ event.preventDefault(); closeDetail(); return; } if(event.target.id === "detailBackdrop"){ closeDetail(); return; } const row = event.target.closest("tbody tr[data-key]"); if(row){ showWord(row.dataset.key); } });
        renderRows();
      <\/script></body></html>`;
      const win = window.open("", "hsk1Vocabulary", "width=980,height=760");
      if(win){ win.document.open(); win.document.write(html); win.document.close(); win.focus(); }
    }
    window.openVocabulary = openVocabulary;

    function toggleCollapse(sectionId, toggleId){
      const section = document.getElementById(sectionId);
      const toggle = document.getElementById(toggleId);
      if(!section || !toggle) return;
      const isCollapsed = section.classList.toggle("collapsed");
      toggle.setAttribute("aria-expanded", String(!isCollapsed));
    }

    updateLevelButtons();
    document.getElementById("checkBtn").onclick = disclose;
    document.getElementById("vocabBtn").onclick = openVocabulary;
    document.getElementById("statsToggle").onclick = () => toggleCollapse("statsSection", "statsToggle");
    document.getElementById("historyToggle").onclick = () => toggleCollapse("historySection", "historyToggle");
    document.getElementById("settingsToggle").onclick = () => toggleCollapse("settingsSection", "settingsToggle");
    document.getElementById("modePinyin").onclick = () => setMode("pinyin");
    document.getElementById("modeChars").onclick = () => setMode("chars");
    document.getElementById("modeBoth").onclick = () => setMode("both");
    document.getElementById("modeAudio").onclick = () => setMode("audio");
    document.getElementById("readBtn").onclick = () => current && speak(current.zh);
    document.getElementById("choiceMode").onclick = () => setQuizMode("choice", true);
    document.getElementById("typeMode").onclick = () => setQuizMode("type", true);
    document.getElementById("reviewMistakesBtn").onclick = reviewMistakes;
    document.getElementById("statsSortBtn").onclick = toggleStatsSort;
    document.getElementById("resetStatsBtn").onclick = () => { if(confirm("Do you really want to delete the statistics?")){ localStorage.removeItem(statsKey()); renderStats(); }};
    document.getElementById("clearHistoryBtn").onclick = () => { if(confirm("Do you really want to delete the sentence history?")){ localStorage.removeItem(historyKey()); renderHistory(); }};
    document.getElementById("homeSet100Btn").onclick = () => setWordLimit(100);
    document.getElementById("homeSet200Btn").onclick = () => setWordLimit(200);
    document.getElementById("homeSet300Btn").onclick = () => setWordLimit(300);
    document.getElementById("homeDefaultSetBtn").onclick = () => setDefaultWordLimit(activeWordLimit);
    document.getElementById("goalHiddenBtn").onclick = () => setDailyGoalPlacement("hidden");
    document.getElementById("goalTopBtn").onclick = () => setDailyGoalPlacement("top");
    document.getElementById("goalBottomBtn").onclick = () => setDailyGoalPlacement("bottom");
    updateQuizModeButtons(); updateModeButtons(); renderStats(); renderHistory(); renderDailyGoal();
  </script>
</body>
</html>
